<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Melody | Sign In</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f172a,#111827,#1e1b4b);
}

.login-box{
    width:360px;
    padding:40px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(15px);
    border-radius:20px;
    border:1px solid rgba(255,255,255,.15);
    box-shadow:0 0 30px rgba(0,0,0,.5);
}

.logo{
    text-align:center;
    color:#ff4fa3;
    font-size:38px;
    font-weight:bold;
    margin-bottom:10px;
}

.subtitle{
    text-align:center;
    color:#ccc;
    margin-bottom:30px;
    font-size:14px;
}

label{
    display:block;
    color:white;
    margin-bottom:8px;
    font-size:14px;
}

input[type=email],
input[type=password]{
    width:100%;
    padding:12px;
    margin-bottom:20px;
    border:none;
    outline:none;
    border-radius:10px;
    background:#1f2937;
    color:white;
    font-size:15px;
}

.options{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:25px;
    color:white;
    font-size:13px;
}

.options a{
    color:#ff4fa3;
    text-decoration:none;
}

button{
    width:100%;
    padding:13px;
    border:none;
    border-radius:10px;
    background:#ff4fa3;
    color:white;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:#ff2d8d;
}

.signup{
    text-align:center;
    color:#ddd;
    margin-top:20px;
    font-size:14px;
}

.signup a{
    color:#ff4fa3;
    text-decoration:none;
    font-weight:bold;
}
</style>

</head>

<body>

<div class="login-box">

<div class="logo">♪ Melody</div>

<p class="subtitle">
Sign in and enjoy your favorite music.
</p>

<form>

<label>Email Address</label>
<input type="email" placeholder="Enter your email">

<label>Password</label>
<input type="password" placeholder="Enter your password">

<div class="options">
<label>
<input type="checkbox">
Remember Me
</label>

<a href="#">Forgot Password?</a>
</div>

<button>Sign In</button>

</form>

<div class="signup">
Don't have an account?
<a href="#">Sign Up</a>
</div>

</div>

</body>
</html>
